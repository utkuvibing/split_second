name: Secret guard

on:
  push:
    branches: [main, master, hermes-v1]
  pull_request:
    branches: [main, master, hermes-v1]

jobs:
  verify-no-secrets:
    name: Block committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify no secrets in repository
        run: node scripts/verify-no-secrets.mjs

      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is tracked by git. Run: git rm --cached .env"
            exit 1
          fi
          echo ".env is not tracked — OK"
