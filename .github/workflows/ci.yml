name: CI/CD

on:
  push:
    branches:
      - main
      - hermes-v1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  eas-ios-production:
    name: EAS iOS production build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/hermes-v1'

    env:
      EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Restore EAS cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.eas/cache
            ~/.npm/_npx
          key: ${{ runner.os }}-eas-${{ github.ref_name }}-${{ hashFiles('eas.json', 'app.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-${{ github.ref_name }}-
            ${{ runner.os }}-eas-

      - name: Install dependencies
        run: npm install

      - name: Build iOS production
        run: npx eas build --platform ios --profile production --non-interactive
