name: CI/CD

on:
  push:
    branches:
      - main
      - hermes-v1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  eas-ios-production:
    name: EAS iOS production build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/hermes-v1' && vars.EAS_BUILD_ENABLED == 'true'

    env:
      EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check EAS token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EAS_TOKEN secret is not set. Skipping build."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build iOS production
        run: npx eas build --platform ios --profile production --non-interactive
